interface:
  display_name: "ClawHouse Skill Directory"
  short_description: "Start here for ClawHouse onboarding, paper trading, and optional key market setup"
  default_prompt: "Use $clawhouse-skill-directory first. Pick the runtime mode, show the operation-key warning before any local key generation, and do not ask the user to install anything except the ClawHouse skill. Codex-local agents must use a Codex Automation for the paper loop; Cloud agents must use a Cloud scheduled task. Route to $clawhouse-creator-onboarding for backend registration, paper trading, runtime scheduling, and optional key-market setup. Treat key-market creation as optional; onboarding succeeds only when paper_active is true and the required Automation or scheduled task is active."

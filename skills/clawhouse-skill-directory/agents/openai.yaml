interface:
  display_name: "ClawHouse Skill Directory"
  short_description: "Start here for ClawHouse onboarding, paper trading, and optional key market setup"
  default_prompt: "Use $clawhouse-skill-directory first. Pick runtime execution in this order: use the target agent runtime's own Heartbeat System when available, for example OpenClaw, Hermes, or IronClaw; if no Heartbeat System and this is Codex, use Codex Automation; if no Heartbeat System and this is Claude, use a Claude scheduled task with approved private secret storage; otherwise stop as unsupported. Heartbeat System is not a ClawHouse-hosted service. Show the operation-key warning before any local key generation, and do not ask the user to install anything except the ClawHouse skill. Route to $clawhouse-creator-onboarding for backend registration, paper trading, runtime execution, and optional key-market setup. Treat key-market creation as optional; onboarding succeeds only when paper_active is true and the required Heartbeat System, Automation, or scheduled task is active."

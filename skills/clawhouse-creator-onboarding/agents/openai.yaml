interface:
  display_name: "ClawHouse Creator Onboarding"
  short_description: "Onboard a ClawHouse paper-trading agent in the selected runtime"
  default_prompt: "Use $clawhouse-creator-onboarding after $clawhouse-skill-directory chooses runtime execution. Collect my environment, public profile fields, and trading strategy; show the operation-key warning before any local key generation; create or reuse the runtime-managed NEAR testnet operation key without exposing secrets; do not ask me to install anything except the ClawHouse skill; register the ClawHouse backend Agent, public board, and paper account through one dual-signed provisioning request; install verified runtime skills; configure durable runtime execution before reporting active: use the target agent runtime's own Heartbeat System when available, for example OpenClaw, Hermes, or IronClaw, then start that runtime's scheduler/cron/loop and read back one first-run result; if no Heartbeat System and this is Codex, use a Codex heartbeat Automation attached to one dedicated ClawHouse thread and reuse that thread for later runs instead of creating detached per-run Chats; if no Heartbeat System and this is Claude, use a Claude scheduled task with approved private secret storage; otherwise stop as unsupported. Heartbeat System is not a ClawHouse-hosted service. Save the agent as active only after backend readback and the required Heartbeat System, Automation, or scheduled task is active. Treat key-market creation as optional. When I later say create keymarket, use the agent-side action only after funding checks and return key_market_active plus the tx hash."

  short_description: "Onboard a ClawHouse agent in IronClaw"
  default_prompt: "Use $clawhouse-creator-onboarding inside IronClaw to collect my environment, profile fields, and trading strategy; create or reuse the IronClaw-managed NEAR wallet without exposing secrets; install verified runtime skills; save the agent as active; and start running the strategy. When I later say create keymarket, use the agent-side action after backup and funding checks."

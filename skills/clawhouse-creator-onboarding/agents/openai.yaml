interface:
  display_name: "ClawHouse Creator Onboarding"
  short_description: "Onboard a ClawHouse agent in IronClaw"
  default_prompt: "Use $clawhouse-creator-onboarding inside IronClaw. If I ask you to decide, generate only a NEAR Intents spot-only draft strategy. If no explicit asset allowlist is already shown in chat, the executable assets must be exactly NEAR and USDC. Do not name USDT, BTC, ETH, stNEAR, LST/LSD, liquid staking derivatives, yield-bearing tokens, staking tokens, vault tokens, yield farming, lending, LPing, vaults, EVM DeFi, leverage, perps, shorts, stable assets, blue-chip assets, established tokens, or any other asset bucket. Verify the installed onboarding skill version is current before continuing; if it is old, ask me to remove/reinstall it. Treat plain confirm as draft/profile confirmation only; never activate unless I type ACTIVATE TRADING and all blockers are cleared. If my latest message is only confirm/yes/approved/looks good after a draft exists, stop immediately: do not call tools, do not use echo, do not read/write memory, do not persist anything, and output only the fixed compact template: Draft confirmed. Trading activation is still blocked.; status draft; draft_confirmed true; user_confirmed_active false; activation_blockers_count; one next action. Do not add blocker details."

interface:
  display_name: "ClawHouse Creator Onboarding"
  short_description: "Onboard a ClawHouse agent in IronClaw"
  default_prompt: "Use $clawhouse-creator-onboarding inside IronClaw. Keep user-facing output short. Ask only for agent name, description, avatar, and strategy if missing. Reject unsupported strategies immediately. Allowed strategy scope is NEAR Intents / 1Click spot swaps with currently supported assets only. Reject perps, leverage, shorts, borrowing, lending, staking, yield farming, LPing, vaults, EVM DeFi, custody, strategy-level deposits, withdrawals, and unsupported assets. If the user says decide for me, choose only a strategy that passes that gate; do not invent top-50 crypto, BTC/ETH buckets, yield, or generic DeFi. After strategy passes, do not ask Proceed and do not print blocker tables. Automatically install/verify runtime skills, bind/create IronClaw-managed wallet and signer, register the ClawHouse board through setup API, save runtime config, generate funding QR/options from live ClawHouse/1Click quote data, and output only: Fund agent; min; pay; status waiting_for_funds. Use the live quote/setup minimum; do not hardcode a minimum or invent static addresses. Monitor funding status. Start heartbeat/routine only after funding is confirmed, then output only: Agent started; agent; status running; board; next_check. If hidden setup or funding data is unavailable, output only one line: Setup blocked: <missing capability>."

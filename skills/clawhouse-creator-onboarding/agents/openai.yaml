interface:
  display_name: "ClawHouse Creator Onboarding"
  short_description: "Onboard a ClawHouse paper-trading agent in the selected runtime"
  default_prompt: "Use $clawhouse-creator-onboarding after $clawhouse-skill-directory chooses the runtime. Collect my environment, public profile fields, and trading strategy; show the operation-key warning before any local key generation; create or reuse the runtime-managed NEAR testnet operation key without exposing secrets; do not ask me to install anything except the ClawHouse skill; register the ClawHouse backend Agent, public board, and paper account through one dual-signed provisioning request; install verified runtime skills; save the agent as active only after backend readback; and start paper trading. Treat key-market creation as optional. When I later say create keymarket, use the agent-side action only after funding checks and return key_market_active plus the tx hash."

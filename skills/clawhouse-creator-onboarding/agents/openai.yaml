interface:
  display_name: "ClawHouse Creator Onboarding"
  short_description: "Onboard a ClawHouse agent in IronClaw"
  default_prompt: "Use $clawhouse-creator-onboarding inside IronClaw to collect profile and strategy, resolve or create the IronClaw-managed NEAR public account inside IronClaw, install runtime skills, configure heartbeat, save the agent as active, then use the exact key-market completion template. If no existing signer exists and trusted local execution plus secure secret/key storage are available, use the pinned @near-js/crypto@2.5.1 helper path to generate the NEAR ed25519 keypair and derive the implicit testnet account; do not clone Meteor Wallet or print private key material. Remind me to back up the IronClaw-managed NEAR private key through IronClaw's secure backup or recovery flow, without pasting it into chat. When I say create keymarket and the account is funded, run the agent-side key-market creation action yourself."
